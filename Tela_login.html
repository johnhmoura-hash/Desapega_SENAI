<!DOCTYPE html>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Desapega SENAI</title>
    <link rel="stylesheet" href="estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" href="Img/possivel logo.png" type="image/x-icon">
</head>

<body>


  <main class="Login-page">
    <img src="Img/logo 2.png" alt="logo"  class="logo">
    <div class="interface">

      <section class="tela-login">
                  
        <h1>Faça seu login</h1>

        <form action="#">

          <div class="campo">
            <label for="usuario">Nome</label>
            <input type="text" id="usuario" placeholder="Digite seu usuário">
            <small></small>
          </div>

          <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha">
            <i id="versenha" class="ri-eye-line"></i>
            <small></small>
          </div>

            <a href="#">Esqueceu a senha?</a>
            <input type="submit" value="Entar" class="botao">

            <button class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Entrar com Google 
          </button>

        <p class="cadastro">
            Não tem uma conta?
            <a href="Tela_criar_login.html">Cadastre-se</a>
        </p>

                  
        </form>

          
      </section>
    </div>
  </main>

  
  <script src="script.js"></script>
</body>


</html>
