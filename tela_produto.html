<div class="box-produto">

  <form class="form-produto" id="formProduto">
    
  <div class="ajustep">
  <div class="photo-upload">
    <label for="inputFoto" class="btn-foto">
      <i class="ri-camera-line"></i>
    </label>

    <input
      type="file"
      id="inputFoto"
      accept="image/*"
      style="display: none;"
    >
  </div>
</div>

    <label>Informações ⓘ</label>

    <label for="nomeProduto" ></label>
    <input type="text" class="input-info" id="nomeProduto" placeholder="Produto">
    <span></span>
  

    <select class="input-info" id="tempoUso" >
      <option value="" disabled selected>Tempo de uso</option>
      <option>1 mês</option>
      <option>2 meses</option>
      <option>3 meses</option>
      <option>4 meses</option>
      <option>5 meses</option>
      <option>6 meses +</option>
      <option>1 ano +</option>
    </select>

    <select class="input-info" id="categoria" >
      <option value="" disabled selected>Categoria</option>
      <option>Papelaria </option>
        <option>Acessórios </option>
        <option>Eletrônicos </option>
        <option>Esporte</option>
        <option>Vestuário</option>
        <option>Livraria</option>
        <option>Objetos</option>
        <option>Outros</option>
    </select>

    <textarea class="input-info" placeholder="Descrição" id="descricao"></textarea>
    <span>Você receberá <i class="ri-money-dollar-circle-line"></i><a>2,00</a></span>

  <h3>Preferências de trocas</h3>
      
  <br>
      <select class="input-info" id="troca" >
        <option value="" disabled selected>Produto p/ troca</option>
        <option>Papelaria </option>
        <option>Acessórios </option>
        <option>Eletrônicos </option>
        <option>Esporte</option>
        <option>Vestuário</option>
        <option>Livraria</option>
        <option>Objetos</option>
        <option>Outros</option>
      </select>
  <br>
      <input class="botao2" type="submit" value="Anunciar">
  </form>
