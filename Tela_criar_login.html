<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novasenha - Desapega SENAI</title>

    <link rel="stylesheet" href="css/formulario.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

    <link rel="icon" href="Img/possivel logo.png" type="image/x-icon">
</head>

<body>

<section class="tela-login">

    <main class="body">

        <h2>Criar conta</h2>

        <form id="form" class="form">

            <div class="campo">

                <label for="usuario">Nome</label>

                <input
                type="text"
                id="usuario"
                placeholder="Digite seu usuário">

                <small></small>

            </div>

            <div class="campo">

                <label for="numMatricula">
                    Número de Matrícula
                </label>

                <input
                id="numMatricula"
                placeholder="Digite o número de matrícula"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                <small></small>

            </div>

            <div class="campo">

                <label for="numTelefone">
                    Número de Telefone
                </label>

                <input
                id="numTelefone"
                placeholder="Digite o número de telefone"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')">

                <small></small>

            </div>

            <div class="campo">

                <label for="email">Email</label>

                <input
                type="email"
                id="email"
                placeholder="Digite o seu email">

                <small></small>

            </div>

            <div class="campo">

                <label for="emailConfirmar">
                    Confirmar Email
                </label>

                <input
                type="email"
                id="emailConfirmar"
                placeholder="Confirme seu email">

                <small></small>

            </div>

            <!-- SENHA -->

            <div class="campo">

                <label for="senha">Senha</label>

                <div class="input-senha">

                    <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha">

                    <i id="versenha" class="ri-eye-line"></i>

                </div>

                <small></small>

            </div>

            <!-- CONFIRMAR SENHA -->

            <div class="campo">

                <label for="confirmarSenha">
                    Confirmar senha
                </label>

                <div class="input-senha">

                    <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="Confirme sua senha">

                    <i id="verconfirmesenha" class="ri-eye-line"></i>

                </div>

                <small></small>

            </div>

            <button type="submit" class="botao">
                CRIAR CONTA
            </button>

        </form>

        <br>

      
    </main>

</section>

<script src="script.js"></script>

</body>
</html>
