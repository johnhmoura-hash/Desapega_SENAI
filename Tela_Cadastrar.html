
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Cadastro</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/formulario_Cadastro.css">
    <link rel="stylesheet" href="css/mobile_tst.css">
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="container">

        <!-- LADO ESQUERDO -->
        <div class="left">
            <img src="Img/logo6.png" class="logo" id="logo">
            
                
        </div>

        <!-- LADO DIREITO -->
        <div class="right">

            <div class="form-box">

                <h2> CRIE UMA CONTA </h2>

            <form>

         
    <div class="input-box">
      <label for="usuario">Nome</label>
      <input type="text" id="usuario" placeholder="Digite seu usuário">
      <small></small>
    </div>

    <div class="input-box">
      <label for="numMatricula">Número de Matrícula</label>
      <input  id="numMatricula" placeholder="Digite o número de matrícula"oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      <small></small>
    </div>
      
    <div class="input-box">
      <label for="numTelefone">Número de Telefone</label>
      <input  id="numTelefone" placeholder="Digite o número de telefone" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
      <small></small>
    </div>
  
    <div class="input-box">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Digite o seu email">
      <small></small>
    </div>

    <div class="input-box">
      <label for="emailConfirmar"> Confirmar Email</label>
      <input type="email" id="emailConfirmar" placeholder="Confirme seu email">
      <small></small>
    </div>

    <div class="input-box">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha">
      <i id="versenha" class="ri-eye-line"></i>
       <small></small>
    </div>

    <div class="input-box">
      <label for="confirmarSenha">Confirmar senha</label>
      <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
       <i id="verconfirmesenha" class="ri-eye-line"></i> 
      <small></small>
    </div>

    <div>
      <button type="submit" class="btn">CRIAR CONTA</button>
    </div>
               </form>   
             <p class="social">
              Já tenho uma conta!
             <a href="tela_login.html">Voltar</a>
            </p>

                   
                   
                </div>

            </div>

        </div>

    </div>
  <script src="js/test.js"></script>
  <script src="js/botãodeversenha.js"></script>
  <script src="js/TelaLogin.js"></script>
</body>


</html>
