<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Senha - Desapega SENAI</title>
     
    <link rel="stylesheet" href="css/Css_esquecer_senha.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

    <link rel="icon" href="Img/possivel logo.png" type="image/x-icon">

  

</head>

<body>

   <main class="interface">
     <section class="tela-login">

      <div class="body">

      <h2>RECUPERAR SENHA</h2>

       <form>

                  
      <div class="campo">

     <label for="email">Email</label>

      <input type="email" id="email" placeholder="Digite o seu email">
      <small></small>
     </div>

     <div class="campo">
      <label for="senha">Nova Senha</label>
      <div class="input-senha">
      <input type="password" id="senha"  placeholder="Digite sua senha" >
     <i id="versenha" class="ri-eye-line"></i>
    </div>
     <small></small>

       </div>                  

       <div class="campo">

        <label for="confirmarSenha"> Confirmar senha  </label>
        <div class="input-senha">
        <input type="password" id="confirmarSenha"  placeholder="Confirme sua senha" >
        <i id="verconfirmesenha" class="ri-eye-line"></i>

        </div>
         <small></small>
        </div>
        <button type="submit" class="botao"> CRIAR NOVA SENHA</button>
      </form>

    </div>

  </section>

   </main>
<script src="js/botãodeversenha.js"></script>
</body>
</html>
