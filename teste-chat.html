<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link rel="stylesheet" href="css/teste.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-rotate"></i>
    </div>

    <div class="menu">

        <div class="search">
            <i class="fa fa-search"></i>
            <input type="text" placeholder="Buscar...">
        </div>

        <button class="btn-menu">Perfil</button>
        <button class="btn-menu">Notificações</button>
        <button class="btn-menu">Chat</button>
        <button class="btn-menu">Anunciar produto</button>

    </div>

</header>

<div class="container">

    <aside class="sidebar">

        <h2>Chat</h2>

        <div class="contact">
            <div class="avatar">
                <i class="fa fa-user"></i>
            </div>

            <div>
                <strong>Jonh Bonfim</strong><br>
                <small>Livro de java / mais</small>
            </div>
        </div>

        <div class="contact">
            <div class="avatar">
                <i class="fa fa-user"></i>
            </div>

            <div>
                <strong>Jaqueline</strong><br>
                <small>Bola</small>
            </div>
        </div>

        <div class="contact-search">
            <input type="text" placeholder="Buscar...">
        </div>

    </aside>

    <main class="chat">

        <div class="chat-header">

            <div class="avatar">
                <i class="fa fa-user"></i>
            </div>

            <strong>John Bonfim</strong>

        </div>

        <div class="chat-body">

            <div class="message left">
                oi, ainda está disponivel a bola?
                <small>20/08</small>
            </div>

            <div class="message right">
                óla, sim, tem interesse?
                <small>20/08</small>
            </div>

 
           <div class="message left">
    se eu perguntei é porque eu tenho
      <small>20/08</small>
</div>


        </div>

        <div class="chat-footer">

            <input type="text" placeholder="Mensagem">

            <button class="send">
                <i class="fa-solid fa-paper-plane"></i>
            </button>

        </div>

    </main>

</div>

</body>
</html>
